<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Torrents</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #202124; --bg2: #292a2d; --text: #e8eaed; --dim: #9aa0a6;
    --accent: #8ab4f8; --border: #3c4043; --input-border: #5f6368;
    --hover: rgba(255,255,255,.08); --hover-row: rgba(255,255,255,0.03);
    --empty: #5f6368;
  }
  body.light {
    --bg: #ffffff; --bg2: #f8f9fa; --text: #202124; --dim: #5f6368;
    --accent: #1a73e8; --border: #dadce0; --input-border: #dadce0;
    --hover: rgba(0,0,0,.06); --hover-row: rgba(0,0,0,0.03);
    --empty: #9aa0a6;
  }
  body { background: var(--bg); color: var(--text); font-family: "Segoe UI", system-ui, sans-serif; }
  .page { display: flex; flex-direction: column; height: 100vh; }
  .header, .search, .tabs, .statusbar { background: var(--bg2); border-bottom: 1px solid var(--border); }
  .header { display: flex; align-items: center; gap: 8px; padding: 10px 16px; }
  .header h1 { font-size: 18px; font-weight: 500; }
  .actions { margin-left: auto; display: flex; gap: 6px; }
  .btn {
    height: 30px; padding: 0 12px; border: 1px solid var(--input-border); border-radius: 6px;
    color: var(--dim); background: transparent; cursor: pointer; font-size: 12px;
  }
  .btn:hover { border-color: var(--accent); color: var(--text); }
  .btn.accent { border-color: transparent; background: var(--accent); color: #ffffff; font-weight: 600; }
  .search { padding: 10px 16px; display: flex; flex-direction: column; gap: 8px; }
  .searchrow { display: flex; align-items: center; gap: 8px; }
  .search input, .search select {
    height: 34px; background: var(--bg); color: var(--text); border: 1px solid var(--input-border); border-radius: 6px;
    padding: 0 10px; font-size: 13px;
  }
  .search input { flex: 1; }
  .status { font-size: 11px; color: var(--dim); min-height: 14px; }
  .status.ok { color: #81c995; }
  .status.err { color: #f28b82; }
  .settings { border: 1px solid var(--border); border-radius: 8px; padding: 10px; display: grid; gap: 8px; grid-template-columns: repeat(3, minmax(180px, 1fr)); }
  .settings.hidden { display: none; }
  .settings label { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--dim); }
  .settings input { height: 30px; border: 1px solid var(--input-border); border-radius: 6px; background: var(--bg); color: var(--text); padding: 0 8px; }
  .settings .full { grid-column: 1 / -1; display: flex; align-items: center; gap: 10px; }
  .tabs { display: flex; }
  .tab { padding: 10px 16px; color: var(--dim); border-bottom: 2px solid transparent; cursor: pointer; font-size: 13px; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .panel { flex: 1; overflow: auto; }
  .hidden { display: none !important; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th, td { padding: 8px 10px; border-bottom: 1px solid rgba(60,64,67,0.6); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  th { position: sticky; top: 0; background: var(--bg2); color: var(--dim); text-transform: uppercase; font-size: 11px; }
  tr:hover td { background: var(--hover-row); }
  .empty { padding: 40px 18px; color: var(--empty); text-align: center; }
  .progress { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 4px; }
  .progress > div { height: 100%; background: var(--accent); }
  .badge { padding: 2px 8px; border-radius: 999px; font-size: 11px; }
  .b-downloading { color: #8ab4f8; background: rgba(138,180,248,.18); }
  .b-ready { color: #fcb266; background: rgba(252,178,102,.2); }
  .b-paused { color: #fdd663; background: rgba(253,214,99,.2); }
  .b-ok { color: #81c995; background: rgba(129,201,149,.2); }
  .b-err { color: #f28b82; background: rgba(242,139,130,.2); }
  .statusbar { border-top: 1px solid var(--border); border-bottom: none; padding: 6px 16px; display: flex; gap: 20px; color: var(--dim); font-size: 11px; }
  .ctx { position: fixed; z-index: 999; min-width: 200px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 4px 0; box-shadow: 0 8px 24px rgba(0,0,0,.4); }
  .ctx.hidden { display: none; }
  .ctx > div { padding: 7px 14px; cursor: pointer; font-size: 13px; }
  .ctx > div:hover { background: var(--hover); }
  .ctx .danger { color: #f28b82; }
  .ctx hr { border: 0; border-top: 1px solid var(--border); margin: 4px 8px; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>Torrents</h1>
    <div class="actions">
      <button class="btn" onclick="doAction('torrent-resume-all')">Resume All</button>
      <button class="btn" onclick="doAction('torrent-pause-all')">Pause All</button>
      <button class="btn accent" onclick="addManual()">+ Add Magnet</button>
    </div>
  </div>

  <div class="search">
    <div class="searchrow">
      <input id="q" placeholder="Search torrents...">
      <select id="provider" onchange="onProviderChanged()">
        <option value="jackett">Jackett</option>
        <option value="prowlarr">Prowlarr</option>
        <option value="tankorent">Tankorent</option>
      </select>
      <select id="indexer"></select>
      <button class="btn accent" id="searchBtn" onclick="searchNow()">Search</button>
      <button class="btn" onclick="toggleSettings()">Provider Settings</button>
    </div>
    <div id="providerStatus" class="status">Loading provider config...</div>
    <div id="settings" class="settings hidden">
      <label>Jackett Base URL<input id="jkBase" placeholder="http://127.0.0.1:9117"></label>
      <label>Jackett API Key<input id="jkKey" placeholder="apikey"></label>
      <label>Jackett Indexer<input id="jkIndexer" placeholder="all"></label>
      <label>Prowlarr Base URL<input id="pwBase" placeholder="http://127.0.0.1:9696"></label>
      <label>Prowlarr API Key<input id="pwKey" placeholder="apikey"></label>
      <label>Prowlarr Indexer<input id="pwIndexer" placeholder="all"></label>
      <div class="full">
        <label><input type="checkbox" id="tkPirate" checked> PirateBay</label>
        <label><input type="checkbox" id="tk1337" checked> 1337x</label>
        <label><input type="checkbox" id="tkNyaa" checked> Nyaa</label>
        <button class="btn" onclick="requestConfig()">Reload</button>
        <button class="btn accent" onclick="saveConfig()">Save</button>
      </div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="search" onclick="switchTab('search')">Search Results</div>
    <div class="tab" data-tab="downloads" onclick="switchTab('downloads')">Downloads <span id="dlCount"></span></div>
  </div>

  <div class="content">
    <div class="panel" id="searchPanel">
      <div class="empty" id="searchEmpty">Search using selected provider and automatic fallback.</div>
      <table id="searchTable" class="hidden">
        <thead><tr><th style="width:auto">Title</th><th style="width:80px;text-align:right">Size</th><th style="width:55px;text-align:right">Seeds</th><th style="width:70px">Source</th><th style="width:70px"></th></tr></thead>
        <tbody id="searchBody"></tbody>
      </table>
    </div>
    <div class="panel hidden" id="downloadsPanel">
      <div class="empty" id="dlEmpty">No torrents yet.</div>
      <table id="dlTable" class="hidden">
        <thead><tr><th style="width:auto">Name</th><th style="width:80px;text-align:right">Size</th><th style="width:60px;text-align:right">Peers</th><th style="width:95px;text-align:right">Down</th><th style="width:95px;text-align:right">Up</th><th style="width:140px">Progress</th><th style="width:140px">Status</th></tr></thead>
        <tbody id="dlBody"></tbody>
      </table>
    </div>
  </div>

  <div class="statusbar">
    <span id="sDown">Down 0 B/s</span>
    <span id="sUp">Up 0 B/s</span>
    <span id="sActive">0 active</span>
  </div>
</div>

<div id="ctx" class="ctx hidden"></div>

<script>
  var searchResults = [];
  var allTorrents = [];
  var selectedTorrentId = "";
  var searching = false;

  function dispatchCommand(url) {
    var cmd = String(url || "").trim();
    if (!cmd) {
      return;
    }
    var frame = document.createElement("iframe");
    frame.style.display = "none";
    frame.src = cmd;
    frame.onload = frame.onerror = function() {
      setTimeout(function() { frame.remove(); }, 0);
    };
    document.body.appendChild(frame);
  }

  var qEl = document.getElementById("q");
  var searchBtn = document.getElementById("searchBtn");
  var providerEl = document.getElementById("provider");
  var indexerEl = document.getElementById("indexer");
  var providerStatusEl = document.getElementById("providerStatus");

  window.addEventListener("error", function(ev) {
    var msg = (ev && ev.message) ? String(ev.message) : "Unknown script error";
    setProviderStatus("UI error: " + msg, "err");
  });
  window.addEventListener("unhandledrejection", function(ev) {
    var reason = ev && ev.reason;
    var msg = (reason && reason.message) ? String(reason.message) : String(reason || "Promise rejected");
    setProviderStatus("UI error: " + msg, "err");
  });

  qEl.addEventListener("keydown", (e) => { if (e.key === "Enter") searchNow(); });

  function switchTab(tab) {
    document.querySelectorAll(".tab").forEach(el => el.classList.toggle("active", el.dataset.tab === tab));
    document.getElementById("searchPanel").classList.toggle("hidden", tab !== "search");
    document.getElementById("downloadsPanel").classList.toggle("hidden", tab !== "downloads");
  }

  function toggleSettings() {
    document.getElementById("settings").classList.toggle("hidden");
  }

  function setProviderStatus(msg, typeCls) {
    providerStatusEl.textContent = msg || "";
    providerStatusEl.classList.remove("ok", "err");
    if (typeCls) providerStatusEl.classList.add(typeCls);
  }

  function requestConfig() {
    dispatchCommand("tanko-browser://torrent-search-config-load");
  }

  function requestIndexers(provider) {
    var p = provider || providerEl.value || "jackett";
    dispatchCommand("tanko-browser://torrent-search-indexers?provider=" + encodeURIComponent(p));
  }

  function onProviderChanged() {
    requestIndexers(providerEl.value || "jackett");
  }

  function saveConfig() {
    var payload = {
      provider: providerEl.value || "jackett",
      jackett: {
        baseUrl: document.getElementById("jkBase").value.trim(),
        apiKey: document.getElementById("jkKey").value.trim(),
        indexer: document.getElementById("jkIndexer").value.trim() || "all"
      },
      prowlarr: {
        baseUrl: document.getElementById("pwBase").value.trim(),
        apiKey: document.getElementById("pwKey").value.trim(),
        indexer: document.getElementById("pwIndexer").value.trim() || "all"
      },
      tankorent: {
        enabled: true,
        sites: {
          piratebay: document.getElementById("tkPirate").checked,
          "1337x": document.getElementById("tk1337").checked,
          nyaa: document.getElementById("tkNyaa").checked
        }
      }
    };
    setProviderStatus("Saving provider settings...", "");
    dispatchCommand("tanko-browser://torrent-search-config-save?payload=" + encodeURIComponent(JSON.stringify(payload)));
  }

  function setTorrentSearchConfig(data) {
    if (typeof data === "string") {
      try { data = JSON.parse(data); } catch (_) { data = {}; }
    }
    var provider = String((data && data.provider) || "jackett").toLowerCase();
    providerEl.value = provider;
    var jk = (data && data.jackett) || {};
    var pw = (data && data.prowlarr) || {};
    var tk = (data && data.tankorent) || {};
    var sites = (tk && tk.sites) || {};

    document.getElementById("jkBase").value = jk.baseUrl || "";
    document.getElementById("jkKey").value = jk.apiKey || "";
    document.getElementById("jkIndexer").value = jk.indexer || "all";
    document.getElementById("pwBase").value = pw.baseUrl || "";
    document.getElementById("pwKey").value = pw.apiKey || "";
    document.getElementById("pwIndexer").value = pw.indexer || "all";
    document.getElementById("tkPirate").checked = sites.piratebay !== false;
    document.getElementById("tk1337").checked = sites["1337x"] !== false;
    document.getElementById("tkNyaa").checked = sites.nyaa !== false;

    setProviderStatus("Provider config loaded", "ok");
    requestIndexers(provider);
  }

  function setTorrentIndexers(data) {
    if (typeof data === "string") {
      try { data = JSON.parse(data); } catch (_) { data = {}; }
    }
    var rows = Array.isArray(data && data.indexers) ? data.indexers : [];
    var keep = indexerEl.value || "all";
    indexerEl.innerHTML = "";
    var all = document.createElement("option");
    all.value = "all";
    all.textContent = "All Indexers";
    indexerEl.appendChild(all);
    rows.forEach((row) => {
      var id = String((row && row.id) || "").trim();
      if (!id) return;
      var opt = document.createElement("option");
      opt.value = id;
      opt.textContent = String((row && row.name) || id);
      indexerEl.appendChild(opt);
    });
    if ([...indexerEl.options].some(o => o.value === keep)) indexerEl.value = keep;
  }

  function searchNow() {
    var q = qEl.value.trim();
    if (!q || searching) return;
    searching = true;
    searchBtn.disabled = true;
    searchBtn.textContent = "Searching...";

    var provider = providerEl.value || "jackett";
    var indexer = indexerEl.value || "all";
    dispatchCommand("tanko-browser://torrent-search?q=" + encodeURIComponent(q)
      + "&provider=" + encodeURIComponent(provider)
      + "&indexer=" + encodeURIComponent(indexer)
      + "&page=0&limit=60");

    setTimeout(() => {
      searching = false;
      searchBtn.disabled = false;
      searchBtn.textContent = "Search";
    }, 20000);
  }

  function setSearchResults(payload) {
    searching = false;
    searchBtn.disabled = false;
    searchBtn.textContent = "Search";
    if (typeof payload === "string") {
      try { payload = JSON.parse(payload); } catch (_) { payload = {}; }
    }
    searchResults = Array.isArray(payload && payload.results) ? payload.results : [];
    renderSearchResults();

    if (payload && payload.ok) {
      var fallback = payload.fallbackUsed ? "fallback " + String(payload.activeProvider || "") : String(payload.activeProvider || payload.provider || "");
      setProviderStatus(fallback ? ("Search via " + fallback) : "Search completed", "ok");
    } else {
      setProviderStatus(String((payload && payload.error) || "Search failed"), "err");
    }
  }

  function renderSearchResults() {
    var empty = document.getElementById("searchEmpty");
    var table = document.getElementById("searchTable");
    var body = document.getElementById("searchBody");
    if (!searchResults.length) {
      table.classList.add("hidden");
      empty.classList.remove("hidden");
      return;
    }
    table.classList.remove("hidden");
    empty.classList.add("hidden");
    body.innerHTML = searchResults.map((r) => {
      var title = escapeHtml(r.title || "Unknown");
      var magnet = r.magnetUri || "";
      var source = escapeHtml(r.sourceName || r.sourceKey || "?");
      var seeds = Number(r.seeders || 0);
      return "<tr>"
        + "<td title='" + escapeAttr(r.title || "") + "'>" + title + "</td>"
        + "<td style='text-align:right'>" + formatSize(Number(r.sizeBytes || 0)) + "</td>"
        + "<td style='text-align:right'>" + seeds + "</td>"
        + "<td>" + source + "</td>"
        + "<td>" + (magnet ? "<button class='btn' onclick=\"addMagnet('" + escapeAttr(magnet) + "')\">Add</button>" : "") + "</td>"
        + "</tr>";
    }).join("");
  }

  function addMagnet(uri) {
    dispatchCommand("tanko-browser://torrent-add?magnet=" + encodeURIComponent(uri));
  }

  function addManual() {
    var v = prompt("Enter magnet URI:");
    if (v && /^magnet:/i.test(v)) addMagnet(v);
  }

  function updateTorrents(payload) {
    if (typeof payload === "string") {
      try { payload = JSON.parse(payload); } catch (_) { payload = {}; }
    }
    var active = Array.isArray(payload && payload.active) ? payload.active : [];
    var history = Array.isArray(payload && payload.history) ? payload.history : [];
    var seen = new Set();
    allTorrents = [];
    active.forEach((t) => { if (t && t.id) { seen.add(t.id); allTorrents.push(t); } });
    history.forEach((t) => { if (t && t.id && !seen.has(t.id)) allTorrents.push(t); });
    renderDownloads();
    renderStats();
  }

  function renderDownloads() {
    var empty = document.getElementById("dlEmpty");
    var table = document.getElementById("dlTable");
    var body = document.getElementById("dlBody");
    if (!allTorrents.length) {
      table.classList.add("hidden");
      empty.classList.remove("hidden");
      document.getElementById("dlCount").textContent = "";
      return;
    }
    table.classList.remove("hidden");
    empty.classList.add("hidden");
    var activeCount = allTorrents.filter(t => ["downloading", "resolving_metadata", "metadata_ready", "streaming"].includes(String(t.state || "").toLowerCase())).length;
    document.getElementById("dlCount").textContent = activeCount > 0 ? "(" + activeCount + ")" : "";
    body.innerHTML = allTorrents.map((t) => {
      var id = escapeAttr(t.id || "");
      var pct = Math.round(Number(t.progress || 0) * 100);
      var st = String(t.state || "");
      return "<tr data-id='" + id + "' onclick=\"selectTorrent('" + id + "')\" oncontextmenu=\"showCtx(event,'" + id + "')\">"
        + "<td title='" + escapeAttr(t.name || "") + "'>" + escapeHtml(t.name || "Torrent") + "</td>"
        + "<td style='text-align:right'>" + formatSize(Number(t.totalSize || 0)) + "</td>"
        + "<td style='text-align:right'>" + Number(t.numPeers || 0) + "</td>"
        + "<td style='text-align:right'>" + formatSpeed(Number(t.downloadRate || 0)) + "</td>"
        + "<td style='text-align:right'>" + formatSpeed(Number(t.uploadSpeed || 0)) + "</td>"
        + "<td><div>" + pct + "%</div><div class='progress'><div style='width:" + pct + "%'></div></div></td>"
        + "<td><span class='badge " + statusClass(st) + "'>" + statusLabel(st) + "</span></td>"
        + "</tr>";
    }).join("");
  }

  function renderStats() {
    var down = 0, up = 0, active = 0;
    allTorrents.forEach((t) => {
      down += Number(t.downloadRate || 0);
      up += Number(t.uploadSpeed || 0);
      if (["downloading", "resolving_metadata", "metadata_ready", "seeding", "streaming"].includes(String(t.state || "").toLowerCase())) active++;
    });
    document.getElementById("sDown").textContent = "Down " + formatSpeed(down);
    document.getElementById("sUp").textContent = "Up " + formatSpeed(up);
    document.getElementById("sActive").textContent = active + " active";
  }

  function selectTorrent(id) { selectedTorrentId = id; }

  function showCtx(ev, id) {
    ev.preventDefault();
    var t = allTorrents.find(x => String(x.id || "") === String(id));
    if (!t) return;
    var st = String(t.state || "").toLowerCase();
    var menu = document.getElementById("ctx");
    var rows = [];
    if (["downloading", "seeding", "streaming"].includes(st)) rows.push({ label: "Pause", fn: () => torrentAction("pause", id) });
    if (st === "paused") rows.push({ label: "Resume", fn: () => torrentAction("resume", id) });
    if (["metadata_ready", "completed_pending", "downloading", "paused", "streaming", "seeding"].includes(st)) rows.push({ label: "Manage Files/Save", fn: () => doAction("torrent-manage", { id: id }) });
    if (["completed", "completed_pending", "completed_with_errors"].includes(st)) rows.push({ label: "Open Folder", fn: () => doAction("torrent-open-folder", { id: id }) });
    if (rows.length) rows.push(null);
    rows.push({ label: "Copy Name", fn: () => copyText(t.name || "") });
    rows.push({ label: "Copy Magnet", fn: () => copyText(t.magnetUri || "") });
    rows.push({ label: "Copy Hash", fn: () => copyText(t.infoHash || "") });
    rows.push(null);
    rows.push({ label: "Remove", fn: () => torrentAction("remove", id) });
    rows.push({ label: "Remove + Delete Files", danger: true, fn: () => torrentAction("remove", id, true) });

    menu.innerHTML = rows.map(r => {
      if (!r) return "<hr>";
      return "<div class='" + (r.danger ? "danger" : "") + "'>" + escapeHtml(r.label) + "</div>";
    }).join("");
    menu.style.left = ev.clientX + "px";
    menu.style.top = ev.clientY + "px";
    menu.classList.remove("hidden");

    var clicks = menu.querySelectorAll("div");
    var i = 0;
    rows.forEach((row) => {
      if (!row) return;
      clicks[i].onclick = () => { hideCtx(); row.fn(); };
      i += 1;
    });
  }

  function hideCtx() { document.getElementById("ctx").classList.add("hidden"); }
  document.addEventListener("click", hideCtx);

  function torrentAction(action, id, deleteFiles) {
    var url = "tanko-browser://torrent-action?action=" + encodeURIComponent(action) + "&id=" + encodeURIComponent(id);
    if (deleteFiles) url += "&deleteFiles=true";
    dispatchCommand(url);
  }

  function doAction(cmd, params) {
    var url = "tanko-browser://" + cmd;
    if (params) {
      var qs = Object.entries(params).map(([k, v]) => k + "=" + encodeURIComponent(v)).join("&");
      if (qs) url += "?" + qs;
    }
    dispatchCommand(url);
  }

  function copyText(t) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(String(t || "")).catch(() => {});
    }
  }

  function formatSize(v) {
    var n = Number(v || 0);
    if (!n) return "-";
    var units = ["B", "KB", "MB", "GB", "TB"];
    var x = n, i = 0;
    while (x >= 1024 && i < units.length - 1) { x /= 1024; i += 1; }
    return x.toFixed(i > 1 ? 1 : 0) + " " + units[i];
  }

  function formatSpeed(v) {
    var n = Number(v || 0);
    if (!n) return "0 B/s";
    return formatSize(n) + "/s";
  }

  function statusClass(state) {
    var s = String(state || "").toLowerCase();
    if (["downloading", "seeding"].includes(s)) return "b-downloading";
    if (["metadata_ready", "resolving_metadata", "completed_pending", "streaming"].includes(s)) return "b-ready";
    if (s === "paused") return "b-paused";
    if (["completed"].includes(s)) return "b-ok";
    if (["failed", "error", "cancelled", "completed_with_errors"].includes(s)) return "b-err";
    return "b-ready";
  }

  function statusLabel(state) {
    var s = String(state || "").toLowerCase();
    if (s === "resolving_metadata") return "Resolving";
    if (s === "metadata_ready") return "Metadata Ready";
    if (s === "completed_pending") return "Completed Pending";
    if (s === "completed_with_errors") return "Completed Errors";
    if (s === "streaming") return "Streaming";
    if (!s) return "Unknown";
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  function escapeHtml(s) {
    var d = document.createElement("div");
    d.textContent = String(s || "");
    return d.innerHTML;
  }

  function escapeAttr(s) {
    return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;").replace(/'/g, "&#39;");
  }

  requestConfig();
</script>
</body>
</html>
