<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Torrents</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #202124;
    color: #e8eaed;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow-x: hidden;
  }

  /* ------------------------------------------------------------------ */
  /* Layout                                                              */
  /* ------------------------------------------------------------------ */

  .page {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    background: #292a2d;
    border-bottom: 1px solid #3c4043;
    flex-shrink: 0;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 400;
    color: #e8eaed;
    flex-shrink: 0;
  }

  .header-actions {
    display: flex;
    gap: 6px;
    margin-left: auto;
  }

  .header-btn {
    height: 30px;
    padding: 0 12px;
    background: transparent;
    border: 1px solid #5f6368;
    border-radius: 6px;
    color: #9aa0a6;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .header-btn:hover { border-color: #8ab4f8; color: #e8eaed; }
  .header-btn.accent {
    background: #8ab4f8;
    color: #202124;
    border-color: transparent;
    font-weight: 600;
  }
  .header-btn.accent:hover { background: #aecbfa; }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ------------------------------------------------------------------ */
  /* Search bar                                                          */
  /* ------------------------------------------------------------------ */

  .search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    background: #292a2d;
    border-bottom: 1px solid #3c4043;
    flex-shrink: 0;
  }

  .search-input {
    flex: 1;
    height: 36px;
    background: #202124;
    border: 1px solid #5f6368;
    border-radius: 6px;
    color: #e8eaed;
    font-size: 14px;
    padding: 0 12px;
    outline: none;
    font-family: inherit;
  }
  .search-input:focus { border-color: #8ab4f8; }

  .search-btn {
    height: 36px;
    padding: 0 20px;
    background: #8ab4f8;
    color: #202124;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .search-btn:hover { background: #aecbfa; }
  .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Site filter chips */
  .site-chips {
    display: flex;
    gap: 6px;
    margin-left: 8px;
  }

  .chip {
    height: 28px;
    padding: 0 12px;
    border-radius: 14px;
    border: 1px solid #5f6368;
    background: transparent;
    color: #9aa0a6;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .chip.active {
    background: rgba(138,180,248,0.15);
    border-color: #8ab4f8;
    color: #8ab4f8;
  }
  .chip:hover { border-color: #8ab4f8; }

  /* ------------------------------------------------------------------ */
  /* Section tabs (Search / Downloads)                                   */
  /* ------------------------------------------------------------------ */

  .section-tabs {
    display: flex;
    background: #292a2d;
    border-bottom: 1px solid #3c4043;
    flex-shrink: 0;
  }

  .section-tab {
    padding: 10px 24px;
    font-size: 13px;
    color: #9aa0a6;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .section-tab:hover { color: #e8eaed; }
  .section-tab.active {
    color: #8ab4f8;
    border-bottom-color: #8ab4f8;
  }

  /* ------------------------------------------------------------------ */
  /* Tables                                                              */
  /* ------------------------------------------------------------------ */

  .table-container {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 1;
  }

  th {
    background: #292a2d;
    padding: 8px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: #9aa0a6;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #3c4043;
    white-space: nowrap;
  }

  td {
    padding: 8px 12px;
    font-size: 13px;
    border-bottom: 1px solid rgba(60,64,67,0.5);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  tr:hover td { background: rgba(255,255,255,0.03); }
  tr.selected td { background: rgba(138,180,248,0.08); }

  /* Column widths — search results */
  .col-title   { width: auto; }
  .col-size    { width: 80px; text-align: right; }
  .col-seeds   { width: 60px; text-align: right; }
  .col-leech   { width: 60px; text-align: right; }
  .col-source  { width: 80px; }
  .col-action  { width: 60px; text-align: center; }

  /* Column widths — downloads */
  .dl-col-name     { width: auto; }
  .dl-col-size     { width: 80px; text-align: right; }
  .dl-col-peers    { width: 60px; text-align: right; }
  .dl-col-dlspeed  { width: 90px; text-align: right; }
  .dl-col-ulspeed  { width: 90px; text-align: right; }
  .dl-col-progress { width: 150px; }
  .dl-col-status   { width: 90px; text-align: center; }

  .seeds { color: #81c995; }
  .leech { color: #f28b82; }

  /* Magnet button */
  .magnet-btn {
    background: none;
    border: 1px solid #5f6368;
    color: #8ab4f8;
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .magnet-btn:hover {
    background: rgba(138,180,248,0.15);
    border-color: #8ab4f8;
  }

  /* Progress bar */
  .progress-wrap {
    height: 6px;
    background: #3c4043;
    border-radius: 3px;
    overflow: hidden;
    margin-top: 4px;
  }
  .progress-bar {
    height: 100%;
    background: #8ab4f8;
    border-radius: 3px;
    transition: width 0.3s;
  }
  .progress-bar.complete { background: #81c995; }
  .progress-bar.paused   { background: #fdd663; }

  .progress-text {
    font-size: 11px;
    color: #9aa0a6;
  }

  /* Status badges */
  .status {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .status-downloading { background: rgba(138,180,248,0.15); color: #8ab4f8; }
  .status-seeding     { background: rgba(129,201,149,0.15); color: #81c995; }
  .status-completed   { background: rgba(129,201,149,0.15); color: #81c995; }
  .status-paused      { background: rgba(253,214,99,0.15);  color: #fdd663; }
  .status-error       { background: rgba(242,139,130,0.15); color: #f28b82; }
  .status-resolving   { background: rgba(138,180,248,0.15); color: #8ab4f8; }

  /* ------------------------------------------------------------------ */
  /* Download filter tabs                                                */
  /* ------------------------------------------------------------------ */

  .dl-filters {
    display: flex;
    gap: 4px;
    padding: 8px 24px;
    background: #202124;
    border-bottom: 1px solid rgba(60,64,67,0.5);
    flex-shrink: 0;
  }

  .dl-filter {
    padding: 4px 14px;
    font-size: 12px;
    border-radius: 12px;
    border: 1px solid transparent;
    background: transparent;
    color: #9aa0a6;
    cursor: pointer;
    font-family: inherit;
  }
  .dl-filter.active {
    background: rgba(138,180,248,0.12);
    color: #8ab4f8;
    border-color: rgba(138,180,248,0.3);
  }
  .dl-filter:hover { color: #e8eaed; }

  /* ------------------------------------------------------------------ */
  /* Context menu                                                        */
  /* ------------------------------------------------------------------ */

  .ctx-menu {
    position: fixed;
    background: #292a2d;
    border: 1px solid #3c4043;
    border-radius: 8px;
    padding: 4px 0;
    min-width: 180px;
    z-index: 1000;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .ctx-item {
    padding: 7px 16px;
    font-size: 13px;
    color: #e8eaed;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ctx-item:hover { background: rgba(255,255,255,0.08); }
  .ctx-item.danger { color: #f28b82; }
  .ctx-sep {
    height: 1px;
    background: #3c4043;
    margin: 4px 8px;
  }

  /* ------------------------------------------------------------------ */
  /* Status bar (bottom)                                                 */
  /* ------------------------------------------------------------------ */

  .status-bar {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 6px 24px;
    background: #292a2d;
    border-top: 1px solid #3c4043;
    font-size: 11px;
    color: #9aa0a6;
    flex-shrink: 0;
  }

  .status-bar span { display: flex; align-items: center; gap: 4px; }

  /* ------------------------------------------------------------------ */
  /* Empty state                                                         */
  /* ------------------------------------------------------------------ */

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    color: #5f6368;
    font-size: 14px;
    text-align: center;
  }
  .empty-state svg { margin-bottom: 16px; opacity: 0.4; }

  /* Hidden helper */
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="page">

  <!-- Header with toolbar -->
  <div class="header">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8ab4f8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17a1 1 0 001 1h6a1 1 0 001-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7z"/>
      <path d="M9 21h6"/><path d="M10 17v4"/><path d="M14 17v4"/>
    </svg>
    <h1>Torrents</h1>
    <div class="header-actions">
      <button class="header-btn" onclick="doAction('torrent-resume-all')" title="Resume All">&#9654; Resume All</button>
      <button class="header-btn" onclick="doAction('torrent-pause-all')" title="Pause All">&#10074;&#10074; Pause All</button>
      <button class="header-btn accent" onclick="addManual()" title="Add Magnet">+ Add Magnet</button>
    </div>
  </div>

  <!-- Search bar -->
  <div class="search-bar">
    <input type="text" class="search-input" id="searchInput" placeholder="Search torrents..." autofocus>
    <button class="search-btn" id="searchBtn" onclick="doSearch()">Search</button>
    <div class="site-chips">
      <button class="chip active" data-site="all" onclick="toggleSite(this)">All</button>
      <button class="chip active" data-site="piratebay" onclick="toggleSite(this)">PirateBay</button>
      <button class="chip active" data-site="1337x" onclick="toggleSite(this)">1337x</button>
      <button class="chip active" data-site="nyaa" onclick="toggleSite(this)">Nyaa</button>
    </div>
  </div>

  <!-- Section tabs -->
  <div class="section-tabs">
    <div class="section-tab active" data-section="search" onclick="switchSection('search')">Search Results</div>
    <div class="section-tab" data-section="downloads" onclick="switchSection('downloads')">
      Downloads <span id="dlCount" style="margin-left:4px;font-size:11px;color:#9aa0a6"></span>
    </div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Search Results section -->
    <div id="searchSection" class="table-container">
      <div class="empty-state" id="searchEmpty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <div>Search for torrents across PirateBay, 1337x, and Nyaa</div>
      </div>
      <table id="searchTable" class="hidden">
        <thead>
          <tr>
            <th class="col-title">Title</th>
            <th class="col-size">Size</th>
            <th class="col-seeds">Seeds</th>
            <th class="col-leech">Leech</th>
            <th class="col-source">Source</th>
            <th class="col-action"></th>
          </tr>
        </thead>
        <tbody id="searchBody"></tbody>
      </table>
    </div>

    <!-- Downloads section -->
    <div id="downloadsSection" class="hidden" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
      <div class="dl-filters">
        <button class="dl-filter active" data-filter="all" onclick="filterDownloads('all', this)">All</button>
        <button class="dl-filter" data-filter="downloading" onclick="filterDownloads('downloading', this)">Downloading</button>
        <button class="dl-filter" data-filter="seeding" onclick="filterDownloads('seeding', this)">Seeding</button>
        <button class="dl-filter" data-filter="completed" onclick="filterDownloads('completed', this)">Completed</button>
        <button class="dl-filter" data-filter="paused" onclick="filterDownloads('paused', this)">Paused</button>
        <button class="dl-filter" data-filter="errored" onclick="filterDownloads('errored', this)">Errored</button>
      </div>
      <div class="table-container">
        <div class="empty-state" id="dlEmpty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <div>No active downloads</div>
          <div style="margin-top:4px;font-size:12px">Search and add magnets to start downloading</div>
        </div>
        <table id="dlTable" class="hidden">
          <thead>
            <tr>
              <th class="dl-col-name">Name</th>
              <th class="dl-col-size">Size</th>
              <th class="dl-col-peers">Peers</th>
              <th class="dl-col-dlspeed">&#8595; Speed</th>
              <th class="dl-col-ulspeed">&#8593; Speed</th>
              <th class="dl-col-progress">Progress</th>
              <th class="dl-col-status">Status</th>
            </tr>
          </thead>
          <tbody id="dlBody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <span id="statDl">&#8595; 0 B/s</span>
    <span id="statUl">&#8593; 0 B/s</span>
    <span id="statActive">0 active</span>
  </div>

</div>

<!-- Context menu overlay -->
<div id="ctxMenu" class="ctx-menu hidden" style="top:0;left:0"></div>

<script>
  // =====================================================================
  // State
  // =====================================================================

  let searchResults = [];
  let allTorrents = [];   // active + history merged
  let currentSection = 'search';
  let dlFilter = 'all';
  let activeSites = new Set(['piratebay', '1337x', 'nyaa']);
  let searching = false;
  let selectedTid = null;

  // =====================================================================
  // Search
  // =====================================================================

  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');

  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doSearch();
  });

  function doSearch() {
    const q = searchInput.value.trim();
    if (!q || searching) return;
    searching = true;
    searchBtn.disabled = true;
    searchBtn.textContent = 'Searching...';
    const encoded = encodeURIComponent(q);
    const sites = Array.from(activeSites).join(',');
    window.location.href = 'tanko-browser://torrent-search?q=' + encoded + '&sites=' + sites;
    setTimeout(() => {
      searching = false;
      searchBtn.disabled = false;
      searchBtn.textContent = 'Search';
    }, 20000);
  }

  function setSearchResults(data) {
    searching = false;
    searchBtn.disabled = false;
    searchBtn.textContent = 'Search';

    if (typeof data === 'string') {
      try { data = JSON.parse(data); } catch(e) { data = {}; }
    }

    searchResults = (data && data.results) || (data && Array.isArray(data) ? data : []);
    renderSearchResults();
  }

  function renderSearchResults() {
    const tbody = document.getElementById('searchBody');
    const table = document.getElementById('searchTable');
    const empty = document.getElementById('searchEmpty');

    if (!searchResults.length) {
      table.classList.add('hidden');
      empty.classList.remove('hidden');
      return;
    }

    table.classList.remove('hidden');
    empty.classList.add('hidden');

    tbody.innerHTML = searchResults.map(r => {
      const size = formatSize(r.sizeBytes || r.size || 0);
      const seeds = r.seeders || r.seeds || 0;
      const leech = r.leechers || r.leech || 0;
      const source = r.sourceName || r.source || r.sourceKey || '?';
      const title = escapeHtml(r.title || 'Unknown');
      const magnet = r.magnetUri || r.magnet || '';
      return `<tr>
        <td class="col-title" title="${escapeAttr(r.title || '')}">${title}</td>
        <td class="col-size">${size}</td>
        <td class="col-seeds"><span class="seeds">${seeds}</span></td>
        <td class="col-leech"><span class="leech">${leech}</span></td>
        <td class="col-source">${escapeHtml(source)}</td>
        <td class="col-action">
          ${magnet ? `<button class="magnet-btn" onclick="addMagnet('${escapeAttr(magnet)}')">+ Add</button>` : ''}
        </td>
      </tr>`;
    }).join('');
  }

  function addMagnet(uri) {
    window.location.href = 'tanko-browser://torrent-add?magnet=' + encodeURIComponent(uri);
  }

  function addManual() {
    const uri = prompt('Enter magnet URI:');
    if (uri && uri.startsWith('magnet:')) {
      addMagnet(uri);
    }
  }

  // =====================================================================
  // Downloads
  // =====================================================================

  function updateTorrents(data) {
    if (typeof data === 'string') {
      try { data = JSON.parse(data); } catch(e) { data = {}; }
    }

    // Merge active + history, dedup by id
    const active = (data && data.active) || [];
    const history = (data && data.history) || [];
    const seen = new Set();
    allTorrents = [];
    for (const t of active) {
      if (t && t.id) { seen.add(t.id); allTorrents.push(t); }
    }
    for (const t of history) {
      if (t && t.id && !seen.has(t.id)) { allTorrents.push(t); }
    }

    renderDownloads();
    renderStatusBar();
    updateDlCount();
  }

  function renderDownloads() {
    const tbody = document.getElementById('dlBody');
    const table = document.getElementById('dlTable');
    const empty = document.getElementById('dlEmpty');

    let filtered = allTorrents;
    if (dlFilter !== 'all') {
      filtered = allTorrents.filter(t => {
        const state = (t.state || '').toLowerCase();
        if (dlFilter === 'downloading') return state === 'downloading' || state === 'resolving_metadata' || state === 'metadata_ready';
        if (dlFilter === 'completed') return state === 'completed' || state === 'completed_pending';
        if (dlFilter === 'seeding') return state === 'seeding';
        if (dlFilter === 'paused') return state === 'paused';
        if (dlFilter === 'errored') return state === 'failed' || state === 'cancelled' || state === 'error';
        return true;
      });
    }

    if (!filtered.length) {
      table.classList.add('hidden');
      empty.classList.remove('hidden');
      return;
    }

    table.classList.remove('hidden');
    empty.classList.add('hidden');

    tbody.innerHTML = filtered.map(t => {
      const name = escapeHtml(t.name || 'Resolving...');
      const size = formatSize(t.totalSize || 0);
      const peers = t.numPeers || 0;
      const dlSpeed = formatSpeed(t.downloadRate || 0);
      const ulSpeed = formatSpeed(t.uploadSpeed || 0);
      const pct = Math.round((t.progress || 0) * 100);
      const state = t.state || 'unknown';
      const statusClass = getStatusClass(state);
      const statusLabel = getStatusLabel(state);
      const tid = escapeAttr(t.id || '');
      const barClass = pct >= 100 ? 'complete' : (state === 'paused' ? 'paused' : '');

      return `<tr data-id="${tid}" class="${selectedTid === t.id ? 'selected' : ''}"
                  onclick="selectTorrent('${tid}')"
                  oncontextmenu="showCtxMenu(event, '${tid}')">
        <td class="dl-col-name" title="${escapeAttr(t.name || '')}">${name}</td>
        <td class="dl-col-size">${size}</td>
        <td class="dl-col-peers">${peers}</td>
        <td class="dl-col-dlspeed">${dlSpeed}</td>
        <td class="dl-col-ulspeed">${ulSpeed}</td>
        <td class="dl-col-progress">
          <div class="progress-text">${pct}%</div>
          <div class="progress-wrap">
            <div class="progress-bar ${barClass}" style="width:${pct}%"></div>
          </div>
        </td>
        <td class="dl-col-status"><span class="status ${statusClass}">${statusLabel}</span></td>
      </tr>`;
    }).join('');
  }

  function selectTorrent(tid) {
    selectedTid = (selectedTid === tid) ? null : tid;
    renderDownloads();
  }

  function renderStatusBar() {
    let dlRate = 0, ulRate = 0, active = 0;
    for (const t of allTorrents) {
      dlRate += (t.downloadRate || 0);
      ulRate += (t.uploadSpeed || 0);
      const s = (t.state || '').toLowerCase();
      if (s === 'downloading' || s === 'seeding' || s === 'resolving_metadata') active++;
    }
    document.getElementById('statDl').innerHTML = '&#8595; ' + formatSpeed(dlRate);
    document.getElementById('statUl').innerHTML = '&#8593; ' + formatSpeed(ulRate);
    document.getElementById('statActive').textContent = active + ' active';
  }

  function updateDlCount() {
    const activeCount = allTorrents.filter(t => {
      const s = (t.state || '').toLowerCase();
      return s === 'downloading' || s === 'resolving_metadata' || s === 'metadata_ready';
    }).length;
    const el = document.getElementById('dlCount');
    el.textContent = activeCount > 0 ? `(${activeCount})` : '';
  }

  // =====================================================================
  // Context menu
  // =====================================================================

  function showCtxMenu(e, tid) {
    e.preventDefault();
    e.stopPropagation();
    selectedTid = tid;
    renderDownloads();

    const t = allTorrents.find(x => x.id === tid);
    if (!t) return;
    const state = (t.state || '').toLowerCase();

    let items = [];

    if (state === 'downloading' || state === 'seeding') {
      items.push({ label: 'Pause', action: () => doTorrentAction('pause', tid) });
    }
    if (state === 'paused') {
      items.push({ label: 'Resume', action: () => doTorrentAction('resume', tid) });
    }
    if (state === 'completed' || state === 'completed_pending') {
      items.push({ label: 'Open Folder', action: () => doAction('torrent-open-folder', { id: tid }) });
    }
    if (items.length) items.push(null); // separator

    items.push({ label: 'Copy Name', action: () => copyText(t.name || '') });
    items.push({ label: 'Copy Magnet', action: () => copyText(t.magnetUri || '') });
    items.push({ label: 'Copy Hash', action: () => copyText(t.infoHash || '') });

    items.push(null); // separator
    items.push({ label: 'Remove', action: () => doTorrentAction('remove', tid) });
    items.push({ label: 'Remove + Delete Files', cls: 'danger', action: () => doTorrentAction('remove', tid, true) });

    const menu = document.getElementById('ctxMenu');
    menu.innerHTML = items.map(item => {
      if (!item) return '<div class="ctx-sep"></div>';
      return `<div class="ctx-item ${item.cls || ''}" data-action="${items.indexOf(item)}">${item.label}</div>`;
    }).join('');

    // Position
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
    menu.classList.remove('hidden');

    // Wire click handlers
    menu.querySelectorAll('.ctx-item').forEach((el, idx) => {
      const itemIdx = parseInt(el.dataset.action);
      const item = items[itemIdx];
      if (item && item.action) {
        el.onclick = () => { hideCtxMenu(); item.action(); };
      }
    });
  }

  function hideCtxMenu() {
    document.getElementById('ctxMenu').classList.add('hidden');
  }

  document.addEventListener('click', hideCtxMenu);
  document.addEventListener('contextmenu', (e) => {
    if (!e.target.closest('#dlBody')) hideCtxMenu();
  });

  function doTorrentAction(action, tid, deleteFiles) {
    let url = 'tanko-browser://torrent-action?action=' + action + '&id=' + encodeURIComponent(tid);
    if (deleteFiles) url += '&deleteFiles=true';
    window.location.href = url;
  }

  function doAction(cmd, params) {
    let url = 'tanko-browser://' + cmd;
    if (params) {
      const qs = Object.entries(params).map(([k,v]) => k + '=' + encodeURIComponent(v)).join('&');
      url += '?' + qs;
    }
    window.location.href = url;
  }

  function copyText(text) {
    navigator.clipboard.writeText(text).catch(() => {});
  }

  // =====================================================================
  // Section switching
  // =====================================================================

  function switchSection(section) {
    currentSection = section;
    document.querySelectorAll('.section-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.section === section);
    });
    document.getElementById('searchSection').classList.toggle('hidden', section !== 'search');
    document.getElementById('downloadsSection').classList.toggle('hidden', section !== 'downloads');
    if (section === 'downloads') {
      document.getElementById('downloadsSection').style.display = 'flex';
    }
  }

  function filterDownloads(filter, btn) {
    dlFilter = filter;
    document.querySelectorAll('.dl-filter').forEach(f => {
      f.classList.toggle('active', f.dataset.filter === filter);
    });
    renderDownloads();
  }

  // =====================================================================
  // Site chip toggle
  // =====================================================================

  function toggleSite(el) {
    const site = el.dataset.site;
    if (site === 'all') {
      const allActive = activeSites.size >= 3;
      activeSites.clear();
      if (!allActive) {
        activeSites.add('piratebay');
        activeSites.add('1337x');
        activeSites.add('nyaa');
      }
    } else {
      if (activeSites.has(site)) activeSites.delete(site);
      else activeSites.add(site);
    }
    document.querySelectorAll('.chip').forEach(c => {
      if (c.dataset.site === 'all') {
        c.classList.toggle('active', activeSites.size >= 3);
      } else {
        c.classList.toggle('active', activeSites.has(c.dataset.site));
      }
    });
  }

  // =====================================================================
  // Utilities
  // =====================================================================

  function formatSize(bytes) {
    if (!bytes || bytes <= 0) return '\u2014';
    const units = ['B', 'KB', 'MB', 'GB', 'TB'];
    let i = 0;
    let val = bytes;
    while (val >= 1024 && i < units.length - 1) { val /= 1024; i++; }
    return val.toFixed(i > 1 ? 1 : 0) + ' ' + units[i];
  }

  function formatSpeed(bytesPerSec) {
    if (!bytesPerSec || bytesPerSec <= 0) return '0 B/s';
    return formatSize(bytesPerSec) + '/s';
  }

  function getStatusClass(state) {
    state = state.toLowerCase();
    if (state === 'downloading') return 'status-downloading';
    if (state === 'resolving_metadata' || state === 'metadata_ready') return 'status-resolving';
    if (state === 'seeding') return 'status-seeding';
    if (state === 'completed' || state === 'completed_pending') return 'status-completed';
    if (state === 'paused') return 'status-paused';
    if (state === 'failed' || state === 'cancelled' || state === 'error') return 'status-error';
    return '';
  }

  function getStatusLabel(state) {
    state = state.toLowerCase();
    if (state === 'resolving_metadata') return 'Resolving';
    if (state === 'metadata_ready') return 'Ready';
    if (state === 'completed_pending') return 'Done';
    if (state === 'cancelled') return 'Cancelled';
    if (state === 'failed') return 'Failed';
    return state.charAt(0).toUpperCase() + state.slice(1);
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function escapeAttr(s) {
    return String(s).replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>

</body>
</html>
