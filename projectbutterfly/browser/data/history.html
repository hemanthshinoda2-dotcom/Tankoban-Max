<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>History</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-page: #202124;
    --text: #e8eaed;
    --text-dim: #9aa0a6;
    --text-url: #5f6368;
    --accent: #8ab4f8;
    --input-bg: #303134;
    --input-border: #5f6368;
    --border: #3c4043;
    --hover-bg: rgba(255,255,255,0.06);
  }
  body.light {
    --bg-page: #ffffff;
    --text: #202124;
    --text-dim: #5f6368;
    --text-url: #9aa0a6;
    --accent: #1a73e8;
    --input-bg: #f1f3f4;
    --input-border: #dadce0;
    --border: #dadce0;
    --hover-bg: rgba(0,0,0,0.06);
  }

  body {
    background: var(--bg-page);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 40px;
    max-width: 800px;
    margin: 0 auto;
  }

  h1 {
    font-size: 28px;
    font-weight: 400;
    margin-bottom: 24px;
  }

  .search-bar {
    width: 100%;
    height: 40px;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 20px;
    color: var(--text);
    font-size: 14px;
    padding: 0 20px;
    outline: none;
    margin-bottom: 24px;
    transition: border-color 0.2s;
  }
  .search-bar:focus {
    border-color: var(--accent);
  }
  .search-bar::placeholder { color: var(--text-dim); }

  .date-group {
    margin-bottom: 24px;
  }

  .date-header {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .history-item {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    gap: 12px;
  }
  .history-item:hover {
    background: var(--hover-bg);
  }

  .history-time {
    font-size: 12px;
    color: var(--text-dim);
    min-width: 50px;
    flex-shrink: 0;
  }

  .history-title {
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .history-url {
    font-size: 12px;
    color: var(--text-url);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 300px;
  }

  .history-delete {
    opacity: 0;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: opacity 0.15s;
  }
  .history-item:hover .history-delete { opacity: 1; }
  .history-delete:hover { color: #ea4335; background: rgba(234,67,53,0.10); }

  .empty-state {
    text-align: center;
    color: var(--text-url);
    padding: 60px 0;
    font-size: 15px;
  }

  .clear-all {
    background: transparent;
    color: #ea4335;
    border: 1px solid rgba(234,67,53,0.40);
    border-radius: 6px;
    padding: 6px 16px;
    font-size: 13px;
    cursor: pointer;
    float: right;
    margin-top: -48px;
    transition: background 0.15s;
  }
  .clear-all:hover { background: rgba(234,67,53,0.10); }
</style>
</head>
<body>

<h1>History</h1>
<button class="clear-all" onclick="clearAll()">Clear all history</button>

<input type="text" class="search-bar" placeholder="Search history" id="searchInput" autofocus>

<div id="historyList"></div>

<script>
  let _historyData = [];

  function dispatchCommand(url) {
    const cmd = String(url || '').trim();
    if (!cmd) {
      return;
    }
    const frame = document.createElement('iframe');
    frame.style.display = 'none';
    frame.src = cmd;
    frame.onload = frame.onerror = function() {
      setTimeout(function() { frame.remove(); }, 0);
    };
    document.body.appendChild(frame);
  }

  function renderHistory(entries) {
    const list = document.getElementById('historyList');
    const query = document.getElementById('searchInput').value.trim().toLowerCase();

    let filtered = entries;
    if (query) {
      filtered = entries.filter(e =>
        (e.title || '').toLowerCase().includes(query) ||
        (e.url || '').toLowerCase().includes(query)
      );
    }

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">No history found</div>';
      return;
    }

    const groups = {};
    for (const entry of filtered) {
      const d = new Date(entry.visitedAt || 0);
      const key = d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      if (!groups[key]) groups[key] = [];
      groups[key].push({ ...entry, time: d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) });
    }

    let html = '';
    for (const [date, items] of Object.entries(groups)) {
      html += `<div class="date-group">`;
      html += `<div class="date-header">${date}</div>`;
      for (const item of items) {
        const title = item.title || item.url || 'Untitled';
        const url = (item.url || '').replace(/^https?:\/\//, '').replace(/\/$/, '');
        html += `
          <div class="history-item" onclick="navigate('${item.url.replace(/'/g, "\\'")}')">
            <span class="history-time">${item.time}</span>
            <span class="history-title">${escapeHtml(title)}</span>
            <span class="history-url">${escapeHtml(url)}</span>
            <button class="history-delete" onclick="event.stopPropagation(); deleteEntry('${(item.id || '').replace(/'/g, "\\'")}')">×</button>
          </div>
        `;
      }
      html += `</div>`;
    }

    list.innerHTML = html;
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigate(url) {
    if (url) window.location.href = url;
  }

  function deleteEntry(id) {
    _historyData = _historyData.filter(e => e.id !== id);
    renderHistory(_historyData);
    dispatchCommand('tanko-browser://history-delete?id=' + encodeURIComponent(id));
  }

  function clearAll() {
    if (confirm('Clear all browsing history? This cannot be undone.')) {
      _historyData = [];
      renderHistory([]);
      dispatchCommand('tanko-browser://history-clear');
    }
  }

  function setHistoryData(data) {
    _historyData = data;
    renderHistory(data);
  }

  document.getElementById('searchInput').addEventListener('input', () => {
    renderHistory(_historyData);
  });
</script>

</body>
</html>
