<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>New Tab</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050505;
    color: rgba(245,245,245,0.92);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding-top: 20vh;
    -webkit-user-select: none;
    user-select: none;
  }

  /* -- Logo / Brand -- */
  .brand {
    font-size: 48px;
    font-weight: 300;
    letter-spacing: -1px;
    margin-bottom: 32px;
    color: rgba(245,245,245,0.92);
  }
  .brand span { color: #c7a76b; }

  /* -- Search bar -- */
  .search-wrapper {
    width: 100%;
    max-width: 560px;
    position: relative;
  }

  .search-input {
    width: 100%;
    height: 46px;
    background: #0c0b09;
    border: 1px solid rgba(199,167,107,0.18);
    border-radius: 24px;
    color: rgba(245,245,245,0.92);
    font-size: 16px;
    padding: 0 48px 0 20px;
    outline: none;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .search-input:focus {
    background: #0c0b09;
    border-color: #c7a76b;
    box-shadow: 0 0 0 2px rgba(199, 167, 107, 0.2);
  }
  .search-input::placeholder {
    color: rgba(245,245,245,0.40);
  }

  .search-icon {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    opacity: 0.4;
  }

  /* -- Shortcuts grid -- */
  .shortcuts {
    display: grid;
    grid-template-columns: repeat(4, 112px);
    gap: 16px;
    margin-top: 40px;
  }

  .shortcut {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 16px 8px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
    color: inherit;
  }
  .shortcut:hover {
    background: rgba(199,167,107,0.08);
  }

  .shortcut-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #141210;
    border: 1px solid rgba(199,167,107,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #c7a76b;
  }

  .shortcut-label {
    font-size: 12px;
    color: rgba(245,245,245,0.55);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
</style>
</head>
<body>

<div class="brand">Tanko<span>ban</span></div>

<div class="search-wrapper">
  <input
    type="text"
    class="search-input"
    placeholder="Search Google or type a URL"
    id="searchInput"
    autofocus
  >
  <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(199,167,107,0.6)" stroke-width="2">
    <circle cx="11" cy="11" r="8"/>
    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </svg>
</div>

<div class="shortcuts" id="shortcuts">
  <a class="shortcut" href="https://www.google.com" data-url="https://www.google.com">
    <div class="shortcut-icon">G</div>
    <div class="shortcut-label">Google</div>
  </a>
  <a class="shortcut" href="https://www.youtube.com" data-url="https://www.youtube.com">
    <div class="shortcut-icon">&#9654;</div>
    <div class="shortcut-label">YouTube</div>
  </a>
  <a class="shortcut" href="https://github.com" data-url="https://github.com">
    <div class="shortcut-icon">&#10216;&#10217;</div>
    <div class="shortcut-label">GitHub</div>
  </a>
  <a class="shortcut" href="https://reddit.com" data-url="https://reddit.com">
    <div class="shortcut-icon">R</div>
    <div class="shortcut-label">Reddit</div>
  </a>
</div>

<script>
  const input = document.getElementById('searchInput');

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const q = input.value.trim();
      if (!q) return;
      // URL-like?
      if (q.includes('.') && !q.includes(' ')) {
        const url = q.startsWith('http') ? q : 'https://' + q;
        window.location.href = url;
      } else {
        window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q);
      }
    }
  });

  // Shortcut clicks — navigate directly
  document.querySelectorAll('.shortcut').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      const url = el.getAttribute('data-url') || el.href;
      if (url) window.location.href = url;
    });
  });
</script>

</body>
</html>
