<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>New Tab</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #202124;
    color: #e8eaed;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding-top: 20vh;
    -webkit-user-select: none;
    user-select: none;
  }

  /* -- Logo / Brand -- */
  .brand {
    font-size: 48px;
    font-weight: 300;
    letter-spacing: -1px;
    margin-bottom: 32px;
    color: #e8eaed;
  }
  .brand span { color: #8ab4f8; }

  /* -- Search bar -- */
  .search-wrapper {
    width: 100%;
    max-width: 560px;
    position: relative;
  }

  .search-input {
    width: 100%;
    height: 46px;
    background: #303134;
    border: 1px solid #5f6368;
    border-radius: 24px;
    color: #e8eaed;
    font-size: 16px;
    padding: 0 48px 0 20px;
    outline: none;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .search-input:focus {
    background: #303134;
    border-color: #8ab4f8;
    box-shadow: 0 0 0 2px rgba(138,180,248,0.2);
  }
  .search-input::placeholder {
    color: #9aa0a6;
  }

  .search-icon {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    opacity: 0.5;
  }

  /* -- Shortcuts grid -- */
  .shortcuts {
    display: grid;
    grid-template-columns: repeat(3, 112px);
    gap: 16px;
    margin-top: 40px;
  }

  .shortcut {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 16px 8px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
    color: inherit;
  }
  .shortcut:hover {
    background: rgba(255,255,255,0.06);
  }

  .shortcut-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #303134;
    border: 1px solid #3c4043;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #8ab4f8;
  }

  .shortcut-label {
    font-size: 12px;
    color: #9aa0a6;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
</style>
</head>
<body>

<div class="brand">Tanko<span>ban</span></div>

<div class="search-wrapper">
  <input
    type="text"
    class="search-input"
    placeholder="Search Yandex or type a URL"
    id="searchInput"
    autofocus
  >
  <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="#9aa0a6" stroke-width="2">
    <circle cx="11" cy="11" r="8"/>
    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </svg>
</div>

<div class="shortcuts" id="shortcuts">
  <a class="shortcut" href="tanko-browser://torrents" data-url="tanko-browser://torrents">
    <div class="shortcut-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8ab4f8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17a1 1 0 001 1h6a1 1 0 001-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7z"/>
        <path d="M9 21h6"/>
        <path d="M10 17v4"/>
        <path d="M14 17v4"/>
      </svg>
    </div>
    <div class="shortcut-label">Torrents</div>
  </a>
  <a class="shortcut" href="tanko-browser://books" data-url="tanko-browser://books">
    <div class="shortcut-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8ab4f8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
        <line x1="9" y1="7" x2="16" y2="7"/>
        <line x1="9" y1="11" x2="14" y2="11"/>
      </svg>
    </div>
    <div class="shortcut-label">Books</div>
  </a>
  <a class="shortcut" href="tanko-browser://comics" data-url="tanko-browser://comics">
    <div class="shortcut-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8ab4f8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="12" y1="3" x2="12" y2="21"/>
        <line x1="3" y1="12" x2="12" y2="12"/>
        <line x1="12" y1="9" x2="21" y2="9"/>
      </svg>
    </div>
    <div class="shortcut-label">Comics</div>
  </a>
</div>

<script>
  const input = document.getElementById('searchInput');

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const q = input.value.trim();
      if (!q) return;
      if (q.includes('.') && !q.includes(' ')) {
        const url = q.startsWith('http') ? q : 'https://' + q;
        window.location.href = url;
      } else {
        window.location.href = 'https://yandex.com/search/?text=' + encodeURIComponent(q);
      }
    }
  });

  document.querySelectorAll('.shortcut').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      const url = el.getAttribute('data-url') || el.href;
      if (url) window.location.href = url;
    });
  });

  // Make SVG icons non-interactive so clicks pass through to the shortcut
  document.querySelectorAll('.shortcut-icon svg').forEach(svg => {
    svg.style.pointerEvents = 'none';
  });
</script>

</body>
</html>
