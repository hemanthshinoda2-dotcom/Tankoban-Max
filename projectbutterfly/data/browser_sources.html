<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tankoban Sources</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:transparent;
  color:rgba(245,245,245,.92);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  font-size:13px;
  overflow-y:auto;
  padding:20px 24px;
}

/* ── Panel glass card ── */
.panel{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;
  margin-bottom:14px;
  padding:14px 16px;
}

.panelTitleRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}

.panelTitleText{
  font-size:12px;
  font-weight:800;
  letter-spacing:1.2px;
  text-transform:uppercase;
  color:rgba(199,167,107,.92);
}

.panelActions{
  display:flex;
  gap:6px;
  align-items:center;
}

/* ── Buttons ── */
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  height:28px;
  padding:0 12px;
  border:1px solid rgba(255,255,255,.10);
  border-radius:10px;
  background:rgba(255,255,255,.06);
  color:rgba(245,245,245,.85);
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  white-space:nowrap;
  transition:background .15s,border-color .15s;
}
.btn:hover{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.16)}
.btn-sm{height:24px;padding:0 8px;font-size:10px}
.btn-gold{
  background:rgba(199,167,107,.15);
  border-color:rgba(199,167,107,.25);
  color:rgba(199,167,107,.92);
}
.btn-gold:hover{background:rgba(199,167,107,.25);border-color:rgba(199,167,107,.40)}
.btn-ghost{background:transparent;border-color:transparent}
.btn-ghost:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.10)}

/* ── Search controls ── */
.sourcesSearchControls{
  display:flex;
  gap:8px;
  flex-wrap:nowrap;
  align-items:center;
  width:100%;
  min-width:0;
  overflow:hidden;
  margin-bottom:8px;
}
.sourcesSearchControls .search{
  flex:1 1 48%;
  min-width:0;
  height:30px;
  padding:0 10px;
  border:1px solid rgba(255,255,255,.10);
  border-radius:10px;
  background:rgba(255,255,255,.06);
  color:rgba(245,245,245,.92);
  font-size:12px;
  outline:none;
}
.sourcesSearchControls .search:focus{border-color:rgba(199,167,107,.40)}
.sourcesSearchControls .select{
  flex:0 0 132px;
  width:132px;
  min-width:132px;
  height:30px;
  padding:0 8px;
  border:1px solid rgba(255,255,255,.10);
  border-radius:10px;
  background:rgba(255,255,255,.06);
  color:rgba(245,245,245,.85);
  font-size:11px;
  cursor:pointer;
  outline:none;
  -webkit-appearance:none;
  appearance:none;
}
.sourcesSearchControls .select option{background:#121820;color:rgba(245,245,245,.92)}
.sourcesSearchControls .btn{
  flex:0 0 112px;
  width:112px;
  min-width:112px;
  margin:0;
}
@media(max-width:980px){
  .sourcesSearchControls{flex-wrap:wrap}
  .sourcesSearchControls .search{flex:1 1 100%;min-width:200px}
}

/* ── Search status ── */
.searchStatus{
  padding:6px 0;
  font-size:11px;
  color:rgba(245,245,245,.50);
}
.searchStatus.hidden{display:none}

/* ── Tables ── */
.tableWrap{
  border:1px solid rgba(255,255,255,.06);
  border-radius:8px;
  overflow:auto;
  max-height:320px;
  background:rgba(18,24,32,.9);
}
table{width:100%;border-collapse:collapse}
th,td{
  padding:8px 10px;
  border-bottom:1px solid rgba(255,255,255,.06);
  text-align:left;
  font-size:12px;
}
th{
  position:sticky;
  top:0;
  background:rgba(22,34,46,.98);
  z-index:8;
  border-bottom:1px solid rgba(255,255,255,.10);
  box-shadow:0 1px 0 rgba(0,0,0,.35);
  font-weight:700;
  color:rgba(245,245,245,.70);
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.5px;
}
.titleCell{
  max-width:520px;
  white-space:normal;
  overflow:visible;
  text-overflow:clip;
  word-break:break-word;
  line-height:1.35;
}
.muted{color:rgba(245,245,245,.40)}
.tiny{font-size:11px}

/* ── Torrent rows on right-click ── */
tr[data-source-torrent-id]{cursor:context-menu}

/* ── Provider config button ── */
.providerConfig{margin-top:10px;text-align:right}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.20)}
</style>
</head>
<body>

<!-- ═══════ TANKOBROWSER DOWNLOADS ═══════ -->
<div class="panel" id="downloadsPanel">
  <div class="panelTitleRow">
    <span class="panelTitleText">TANKOBROWSER DOWNLOADS</span>
    <div class="panelActions">
      <button class="btn btn-sm" id="clearDownloadsBtn">Clear</button>
    </div>
  </div>
  <div class="tableWrap">
    <table>
      <thead>
        <tr>
          <th style="width:30px">#</th>
          <th class="titleCell">Download Name</th>
          <th>Size</th>
          <th>Download Speed</th>
          <th style="width:80px">Download %</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="downloadsBody">
        <tr><td colspan="7" class="muted tiny" style="text-align:center;padding:20px">No downloads yet.</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ═══════ TANKOBAN SEARCH ═══════ -->
<div class="panel" id="searchPanel">
  <div class="panelTitleRow">
    <span class="panelTitleText">TANKOBAN SEARCH</span>
    <div class="panelActions">
      <button class="btn btn-sm" id="configProvidersBtn" title="Configure torrent providers">Providers</button>
    </div>
  </div>
  <div class="sourcesSearchControls">
    <input id="sourcesSearchInput" class="search" type="text" placeholder="Search torrents..." autocomplete="off" spellcheck="false"/>
    <select id="sourcesSearchSource" class="select" title="Source">
      <option value="all">All Sources</option>
    </select>
    <select id="sourcesSearchType" class="select" title="Type filter">
      <option value="all">All Types</option>
      <option value="comics">Comics</option>
      <option value="books">Books</option>
      <option value="tv">TV</option>
      <option value="movies">Movies</option>
      <option value="anime">Anime</option>
      <option value="audio">Audio</option>
      <option value="other">Other</option>
    </select>
    <select id="sourcesSearchSort" class="select" title="Sort">
      <option value="relevance">Sort: Relevance</option>
      <option value="seeders_desc">Sort: Seeders</option>
      <option value="size_desc">Sort: Size</option>
    </select>
    <button id="sourcesSearchBtn" class="btn btn-gold">Search</button>
  </div>
  <div id="searchStatus" class="searchStatus hidden"></div>
  <div class="tableWrap">
    <table>
      <thead>
        <tr>
          <th class="titleCell">Title</th>
          <th>Size</th>
          <th>Files</th>
          <th>Seeders</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="sourcesSearchBody">
        <tr><td colspan="5" class="muted tiny" style="text-align:center;padding:20px">Search for torrents above.</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ═══════ TANKOBAN TORRENTS ═══════ -->
<div class="panel" id="torrentsPanel">
  <div class="panelTitleRow">
    <span class="panelTitleText">TANKOBAN TORRENTS</span>
    <div class="panelActions">
      <button class="btn btn-sm" id="unhideBtn">Unhide</button>
    </div>
  </div>
  <div class="tableWrap">
    <table>
      <thead>
        <tr>
          <th style="width:30px">#</th>
          <th class="titleCell">Torrent Name</th>
          <th>Size</th>
          <th>Download Speed</th>
          <th style="width:80px">Download %</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="sourcesTorrentBody">
        <tr><td colspan="6" class="muted tiny" style="text-align:center;padding:20px">No torrents yet.</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
(function(){
  'use strict';

  // ── Helpers ──
  function escapeHtml(s){
    var d=document.createElement('div');d.textContent=s;return d.innerHTML;
  }
  function formatBytes(b){
    var n=Number(b||0);
    if(n<=0)return '0 B';
    if(n<1024)return n+' B';
    if(n<1048576)return (n/1024).toFixed(1)+' KB';
    if(n<1073741824)return (n/1048576).toFixed(1)+' MB';
    return (n/1073741824).toFixed(2)+' GB';
  }
  function formatSpeed(b){
    var n=Number(b||0);
    if(n<=0)return '-';
    return formatBytes(n)+'/s';
  }

  // ── Communication: tankoweb:// scheme for Python ──
  function sendCmd(cmd,params){
    var q='';
    if(params){
      var parts=[];
      for(var k in params){if(params.hasOwnProperty(k))parts.push(encodeURIComponent(k)+'='+encodeURIComponent(params[k]))}
      if(parts.length)q='?'+parts.join('&');
    }
    var url='tankoweb://'+cmd+q;
    // Use an iframe to avoid navigating away from the page
    var f=document.createElement('iframe');
    f.style.display='none';
    f.src=url;
    document.body.appendChild(f);
    setTimeout(function(){try{document.body.removeChild(f)}catch(e){}},500);
  }

  // ── Search ──
  var searchBtn=document.getElementById('sourcesSearchBtn');
  var searchInput=document.getElementById('sourcesSearchInput');
  var searchSource=document.getElementById('sourcesSearchSource');
  var searchType=document.getElementById('sourcesSearchType');
  var searchSort=document.getElementById('sourcesSearchSort');
  var searchBody=document.getElementById('sourcesSearchBody');
  var searchStatus=document.getElementById('searchStatus');

  function doSearch(){
    var q=(searchInput.value||'').trim();
    if(!q)return;
    searchStatus.textContent='Searching...';
    searchStatus.classList.remove('hidden');
    sendCmd('sources-search',{
      q:q,
      source:searchSource.value||'all',
      type:searchType.value||'all',
      sort:searchSort.value||'relevance'
    });
  }

  if(searchBtn)searchBtn.addEventListener('click',doSearch);
  if(searchInput)searchInput.addEventListener('keydown',function(e){if(e.key==='Enter')doSearch()});

  // Magnet click delegation
  if(searchBody)searchBody.addEventListener('click',function(e){
    var btn=e.target.closest('[data-magnet-id]');
    if(!btn)return;
    sendCmd('sources-add-magnet',{id:btn.dataset.magnetId});
  });

  // ── Torrents ──
  var torrentBody=document.getElementById('sourcesTorrentBody');
  if(torrentBody)torrentBody.addEventListener('contextmenu',function(e){
    var row=e.target.closest('[data-source-torrent-id]');
    if(!row)return;
    e.preventDefault();
    sendCmd('sources-torrent-context',{id:row.dataset.sourceTorrentId,x:String(e.clientX),y:String(e.clientY)});
  });

  // Unhide button
  var unhideBtn=document.getElementById('unhideBtn');
  if(unhideBtn)unhideBtn.addEventListener('click',function(){sendCmd('sources-unhide-all')});

  // ── Downloads ──
  var clearDlBtn=document.getElementById('clearDownloadsBtn');
  if(clearDlBtn)clearDlBtn.addEventListener('click',function(){sendCmd('sources-clear-downloads')});

  // ── Providers ──
  var configBtn=document.getElementById('configProvidersBtn');
  if(configBtn)configBtn.addEventListener('click',function(){sendCmd('sources-config-providers')});

  // ── API: Python calls these to push data ──

  window.updateSearchResults=function(data){
    if(!searchBody)return;
    searchStatus.classList.add('hidden');
    if(!Array.isArray(data)||!data.length){
      searchBody.innerHTML='<tr><td colspan="5" class="muted tiny" style="text-align:center;padding:20px">No results.</td></tr>';
      return;
    }
    var html='';
    for(var i=0;i<data.length;i++){
      var r=data[i]||{};
      var metaBits=[];
      if(r.sourceName)metaBits.push(String(r.sourceName));
      if(Array.isArray(r.typeLabels)&&r.typeLabels.length)metaBits.push(r.typeLabels.slice(0,2).join(', '));
      var sub=metaBits.length?('<div class="muted tiny">'+escapeHtml(metaBits.join(' \u2022 '))+'</div>'):'';
      html+='<tr>'
        +'<td class="titleCell" title="'+escapeHtml(r.title||'')+'">'+escapeHtml(r.title||'-')+sub+'</td>'
        +'<td>'+escapeHtml(formatBytes(r.sizeBytes))+'</td>'
        +'<td>'+escapeHtml(String(r.fileCount!=null?r.fileCount:'-'))+'</td>'
        +'<td>'+escapeHtml(String(r.seeders!=null?r.seeders:0))+'</td>'
        +'<td><button class="btn btn-sm btn-gold" data-magnet-id="'+escapeHtml(String(r.id||''))+'">Magnet</button></td>'
      +'</tr>';
    }
    searchBody.innerHTML=html;
  };

  window.updateTorrents=function(data){
    if(!torrentBody)return;
    if(!Array.isArray(data)||!data.length){
      torrentBody.innerHTML='<tr><td colspan="6" class="muted tiny" style="text-align:center;padding:20px">No torrents yet.</td></tr>';
      return;
    }
    var html='';
    for(var i=0;i<data.length;i++){
      var t=data[i]||{};
      var pct=t.progress!=null?(Math.round(Number(t.progress)*100)+'%'):'0%';
      var status=String(t.state||'unknown');
      html+='<tr data-source-torrent-id="'+escapeHtml(String(t.id||t.hash||''))+'">'
        +'<td>'+(i+1)+'</td>'
        +'<td class="titleCell" title="'+escapeHtml(String(t.name||'Torrent'))+'">'+escapeHtml(String(t.name||'Torrent'))+'</td>'
        +'<td>'+escapeHtml(formatBytes(t.totalSize||t.size||0))+'</td>'
        +'<td>'+escapeHtml(formatSpeed(t.downloadRate||t.dlspeed||0))+'</td>'
        +'<td>'+escapeHtml(pct)+'</td>'
        +'<td>'+escapeHtml(status)+'</td>'
      +'</tr>';
    }
    torrentBody.innerHTML=html;
  };

  window.updateDownloads=function(data){
    var body=document.getElementById('downloadsBody');
    if(!body)return;
    if(!Array.isArray(data)||!data.length){
      body.innerHTML='<tr><td colspan="7" class="muted tiny" style="text-align:center;padding:20px">No downloads yet.</td></tr>';
      return;
    }
    var html='';
    for(var i=0;i<data.length;i++){
      var d=data[i]||{};
      var size=Number(d.totalBytes||d.received||0);
      var received=Number(d.received||0);
      var pct=size>0?String(Math.max(0,Math.min(100,Math.round((received/size)*100))))+'%':'-';
      var speed=formatSpeed(d.speed||0);
      var status=String(d.state||'downloading');
      var action='';
      if(status==='completed'){
        action='<button class="btn btn-ghost btn-sm" data-dl-open="'+escapeHtml(String(d.id||''))+'">Open</button>'
          +' <button class="btn btn-ghost btn-sm" data-dl-show="'+escapeHtml(String(d.id||''))+'">Folder</button>';
      }else if(d.id){
        action='<button class="btn btn-ghost btn-sm" data-dl-cancel="'+escapeHtml(String(d.id||''))+'">Cancel</button>';
      }
      html+='<tr>'
        +'<td>'+(i+1)+'</td>'
        +'<td class="titleCell" title="'+escapeHtml(String(d.filename||d.name||'Download'))+'">'+escapeHtml(String(d.filename||d.name||'Download'))+'</td>'
        +'<td>'+escapeHtml(formatBytes(size))+'</td>'
        +'<td>'+escapeHtml(speed)+'</td>'
        +'<td>'+escapeHtml(pct)+'</td>'
        +'<td>'+escapeHtml(status)+'</td>'
        +'<td>'+action+'</td>'
      +'</tr>';
    }
    body.innerHTML=html;
  };

  window.updateSources=function(indexers){
    if(!searchSource)return;
    var html='<option value="all">All Sources</option>';
    if(Array.isArray(indexers)){
      for(var i=0;i<indexers.length;i++){
        var ix=indexers[i]||{};
        html+='<option value="'+escapeHtml(String(ix.id||ix.name||''))+'">'+escapeHtml(String(ix.name||ix.id||''))+'</option>';
      }
    }
    searchSource.innerHTML=html;
  };

  window.setSearchLoading=function(loading){
    if(loading){
      searchStatus.textContent='Searching...';
      searchStatus.classList.remove('hidden');
    }else{
      searchStatus.classList.add('hidden');
    }
  };

  window.setSearchError=function(msg){
    searchStatus.textContent=msg||'Search failed.';
    searchStatus.classList.remove('hidden');
    searchBody.innerHTML='<tr><td colspan="5" class="muted tiny" style="text-align:center;padding:20px">'+escapeHtml(msg||'Search failed.')+'</td></tr>';
  };

  // Download actions delegation
  var dlBody=document.getElementById('downloadsBody');
  if(dlBody)dlBody.addEventListener('click',function(e){
    var btn=e.target.closest('[data-dl-open]');
    if(btn){sendCmd('sources-dl-open',{id:btn.dataset.dlOpen});return}
    btn=e.target.closest('[data-dl-show]');
    if(btn){sendCmd('sources-dl-show',{id:btn.dataset.dlShow});return}
    btn=e.target.closest('[data-dl-cancel]');
    if(btn){sendCmd('sources-dl-cancel',{id:btn.dataset.dlCancel});return}
  });

  // Signal ready to Python
  sendCmd('sources-ready');

})();
</script>
</body>
</html>
